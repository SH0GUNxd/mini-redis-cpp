version: '3.8'

services:
  server:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mini-redis-server
    ports:
      - "6379:6379"
    restart: unless-stopped

  benchmark:
    image: python:3.10-slim
    container_name: mini-redis-benchmark
    depends_on:
      - server
    volumes:
      - ./client:/app
    working_dir: /app
    environment:
      # This matches the service name of our C++ container above
      - REDIS_HOST=server 
    command: python benchmark.py