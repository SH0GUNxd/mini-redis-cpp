name: Mini-Redis CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Build and Start Server Container
      run: docker compose up -d --build server

    - name: Wait for Server to Boot
      run: sleep 5

    - name: Run Integration Tests
      run: pytest tests/ -v

    - name: View Server Logs (On Failure)
      if: failure()
      run: docker compose logs server

    - name: Tear Down Infrastructure
      if: always()
      run: docker compose down